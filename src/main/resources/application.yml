# src/main/resources/application.yml

server:
  port: 8080 # 服务端口设置为 8080

spring:
  datasource:
    # 数据库1连接配置
    # 替换 YOUR_ALIYUN_IP 47.120.31.133
    # 替换 YOUR_DB_NAME 请在 DBeaver 中查看实际数据库名 (例如 course_db)
    # serverTimezone=Asia/Shanghai 设置东八区时区
    url: jdbc:mysql://47.120.31.133:3306/camp_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    
    # 用户名
    username: root
    password: DailyChineseCultureCODE123. # 密码
    
    # 驱动类 (MySQL 8.0+ 使用)
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis:
  # 开启驼峰命名转换 (数据库下划线字段自动映射到Java驼峰属性)
  configuration:
    map-underscore-to-camel-case: true
  # Mapper XML文件位置
  mapper-locations: classpath:mapper/*.xml
